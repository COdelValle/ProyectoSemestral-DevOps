name: Proyecto DevOps CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # --- TRABAJO 1: TESTEAR EL BACKEND (JAVA) ---
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run Backend Tests (Despacho)
        run: |
          cd back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
          chmod +x mvnw
          ./mvnw test

      - name: Run Backend Tests (Venta)
        run: |
          cd back-Ventas_SpringBoot/Springboot-API-REST
          chmod +x mvnw
          ./mvnw test

  # --- TRABAJO 2: TESTEAR EL FRONTEND (REACT) ---
  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: './front_despacho/package-lock.json'

      - name: Install Dependencies
        run: |
          cd front_despacho
          npm install

      - name: Run Frontend Tests
        run: |
          cd front_despacho
          npm test -- --watchAll=false --passWithNoTests

  # --- TRABAJO 3: DOCKER BUILD (VERIFICAR COMPILACIÓN) ---
  docker-build:
    needs: [backend-tests, frontend-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Verify Docker Compose Build
        run: docker-compose build