name: Despliegue Continuo

on:
  push:
    branches:
      - deploy
env:
  AWS_REGION: us-east-1
  CLUSTER: innovatech-cluster

jobs:
  deploy:
    name: Despliegue a AWS EKS
    runs-on: ubuntu-latest

    steps:
      # --- 1. DESCARGAR EL CÓDIGO ---
      - name: Checkout Code
        uses: actions/checkout@v4

      # --- 2. COMPILACIÓN DE AMBOS BACKENDS (JAVA/MAVEN) ---
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build Backends JARs
        run: |
          # Compilar backend de Despachos
          cd back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
          chmod +x mvnw
          ./mvnw clean package -DskipTests
          
          # Compilar backend de Ventas
          cd ../../back-Ventas_SpringBoot/Springboot-API-REST
          chmod +x mvnw
          ./mvnw clean package -DskipTests

      # --- 3. COMPILACIÓN DEL FRONTEND (NODE/VITE) ---
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Build Frontend Production
        run: |
          cd front_despacho
          npm install
          npm run build

      # --- 4. CONFIGURAR CREDENCIALES AWS ACADEMY ---
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Login en ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # --- 5. BUILD Y PUSH DOCKER: BACKEND VENTAS ---
      - name: Build y Push Ventas Backend
        run: |
          docker build --platform linux/amd64 \
          -t ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/innovatech-ventas-backend:latest \
          ./back-Ventas_SpringBoot/Springboot-API-REST
          docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/innovatech-ventas-backend:latest

      # --- 6. BUILD Y PUSH DOCKER: BACKEND DESPACHOS ---
      - name: Build y Push Despacho Backend
        run: |
          docker build --platform linux/amd64 \
          -t ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/innovatech-despacho-backend:latest \
          ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
          docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/innovatech-despacho-backend:latest

      # --- 7. BUILD Y PUSH DOCKER: FRONTEND ---
      - name: Build y Push Frontend
        run: |
          docker build --platform linux/amd64 \
          -t ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/innovatech-frontend:latest \
          ./front_despacho
          docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/innovatech-frontend:latest

      # --- 8. CONECTAR CON EKS ---
      - name: Update Kubeconfig for EKS
        run: |
          aws eks update-kubeconfig --name ${{ env.CLUSTER }} --region ${{ env.AWS_REGION }}

      # --- 9. DESPLIEGUE EN KUBERNETES ---
      - name: Deploy Secrets and Config
        run: |
          kubectl apply -f Infrastructure/k8s/secrets.yml

      - name: Deploy Infrastructure and Database
        run: |
          kubectl apply -f Infrastructure/k8s/infra-db.yaml

      - name: Deploy Microservices
        run: |
          kubectl apply -f Infrastructure/k8s/apps-deployments.yaml
          kubectl apply -f Infrastructure/k8s/apps-services.yml
          kubectl apply -f Infrastructure/k8s/hpas.yml

      # --- 10. FORZAR ACTUALIZACIÓN DE PODS ---
      - name: Force Rollout to pull new images
        run: |
          kubectl rollout restart deployment deployment-despacho
          kubectl rollout restart deployment deployment-ventas
          kubectl rollout restart deployment deployment-frontend