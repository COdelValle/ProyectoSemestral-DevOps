name: Despliegue Continuo

on:
  push:
    branches:
      - deploy
env:
  AWS_REGION: us-east-1
  CLUSTER: innovatech-cluster

jobs:
  deploy:
    name: Despliegue a AWS EKS
    runs-on: ubuntu-latest

    steps:
      # --- 1. DESCARGAR EL CÓDIGO ---
      - name: Checkout Code
        uses: actions/checkout@v4

      # --- 2. COMPILACIÓN DE AMBOS BACKENDS (JAVA/MAVEN) ---
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build Backends JARs
        run: |
          # Compilar backend de Despachos
          cd back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
          chmod +x mvnw
          ./mvnw clean package -DskipTests
          
          # Compilar backend de Ventas
          cd ../../back-Ventas_SpringBoot/Springboot-API-REST
          chmod +x mvnw
          ./mvnw clean package -DskipTests

      # --- 3. COMPILACIÓN DEL FRONTEND (NODE/VITE) ---
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Build Frontend Production
        run: |
          cd front_despacho
          npm install
          npm run build

      # --- 4. CONFIGURAR CREDENCIALES AWS ACADEMY ---
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Login en ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Obtener AWS Account ID y definir variables
        run: |
          echo "ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)" >> $GITHUB_ENV
          echo "ECR_REGISTRY=$(aws sts get-caller-identity --query Account --output text).dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com" >> $GITHUB_ENV

      # --- 5. BUILD Y PUSH DOCKER ---
      - name: Build y Push Imágenes
        run: |
          # Ventas
          docker build --platform linux/amd64 -t $ECR_REGISTRY/innovatech-ventas-backend:${{ github.sha }} ./back-Ventas_SpringBoot/Springboot-API-REST
          docker push $ECR_REGISTRY/innovatech-ventas-backend:${{ github.sha }}
          
          # Despachos
          docker build --platform linux/amd64 -t $ECR_REGISTRY/innovatech-despacho-backend:${{ github.sha }} ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
          docker push $ECR_REGISTRY/innovatech-despacho-backend:${{ github.sha }}
          
          # Frontend
          docker build --platform linux/amd64 -t $ECR_REGISTRY/innovatech-frontend:${{ github.sha }} ./front_despacho
          docker push $ECR_REGISTRY/innovatech-frontend:${{ github.sha }}

      # --- 6. CONECTAR CON EKS ---
      - name: Update Kubeconfig for EKS
        run: |
          aws eks update-kubeconfig --name ${{ env.CLUSTER }} --region ${{ env.AWS_REGION }}

      # --- 7. DESPLIEGUE EN KUBERNETES ---
      - name: Deploy Secrets and Config
        run: |
          kubectl apply -f ./Infrastructure/k8s/secret.yml

      - name: Deploy Infrastructure and Database
        run: |
          kubectl apply -f ./Infrastructure/k8s/infra-db.yml

      - name: Deploy Microservices
        run: |
          kubectl apply -f ./Infrastructure/k8s/apps-deployments.yml
          kubectl apply -f ./Infrastructure/k8s/apps-services.yml
          kubectl apply -f ./Infrastructure/k8s/hpas.yml

      # --- 8. ACTUALIZACIÓN DE IMÁGENES ---
      - name: Actualizar imágenes en el clúster
        run: |
          kubectl set image deployment/deployment-ventas ventas-container=$ECR_REGISTRY/innovatech-ventas-backend:${{ github.sha }}
          kubectl set image deployment/deployment-despacho despacho-container=$ECR_REGISTRY/innovatech-despacho-backend:${{ github.sha }}
          kubectl set image deployment/deployment-frontend frontend-container=$ECR_REGISTRY/innovatech-frontend:${{ github.sha }}

      - name: Verificar despliegue (Rollout Status)
        run: |
          kubectl rollout restart deployment/deployment-frontend -n default
          kubectl rollout restart deployment/deployment-ventas -n default
          kubectl rollout restart deployment/deployment-despacho -n default