# ====================================================================
# 1. FRONTEND
# ====================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: deployment-frontend
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend-container
        image: 019874521665.dkr.ecr.us-east-1.amazonaws.com/innovatech-frontend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "300m"
            memory: "256Mi"
 
---
# ====================================================================
# 2. BACKEND VENTAS
# ====================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: deployment-ventas
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ventas-backend
  template:
    metadata:
      labels:
        app: ventas-backend
    spec:
      containers:
      - name: ventas-container
        image: 019874521665.dkr.ecr.us-east-1.amazonaws.com/innovatech-ventas-backend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        env:
          - name: DB_ENDPOINT
            value: "mysql-service"
          - name: DB_PORT
            value: "3306"
          - name: DB_NAME
            valueFrom:
              secretKeyRef:
                name: secretos
                key: DATABASE
          - name: DB_USERNAME
            value: "root"
          - name: DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: secretos
                key: ROOT_PASSWORD
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
 
---
# ====================================================================
# 3. BACKEND DESPACHOS
# ====================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: deployment-despacho
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: despacho-backend
  template:
    metadata:
      labels:
        app: despacho-backend
    spec:
      containers:
      - name: despacho-container
        image: 019874521665.dkr.ecr.us-east-1.amazonaws.com/innovatech-despacho-backend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8081
        env:
          - name: DB_ENDPOINT
            value: "mysql"
          - name: DB_PORT
            value: "3306"
          - name: DB_NAME
            valueFrom:
              secretKeyRef:
                name: secretos
                key: DATABASE
          - name: DB_USERNAME
            value: "root"
          - name: DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: secretos
                key: ROOT_PASSWORD
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"