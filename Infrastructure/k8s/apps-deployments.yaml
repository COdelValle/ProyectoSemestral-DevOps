# ====================================================================
# 1. FRONTEND
# ====================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: deployment-frontend # Coincide con tu frontend_hpa de Terraform
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend-container
        image: tu_id_://amazonaws.com
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "300m"
            memory: "256Mi"
 
---
# ====================================================================
# 2. BACKEND VENTAS
# ====================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: deployment-ventas # Coincide con tu ventas_hpa de Terraform
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ventas-backend
  template:
    metadata:
      labels:
        app: ventas-backend
    spec:
      containers:
      - name: ventas-container
        image: tu_id_://amazonaws.com
        ports:
        - containerPort: 8081
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
 
---
